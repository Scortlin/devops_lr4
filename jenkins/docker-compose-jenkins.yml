version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-cicd
    privileged: true
    user: root
    ports:
      - "8080:8080"   # Веб-интерфейс Jenkins
      - "50000:50000" # Порт для агентов
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Проброс Docker socket
      - ../:/workspace  # Монтируем корень проекта
    networks:
      - cicd-network

volumes:
  jenkins_home:

networks:
  cicd-network:
    driver: bridge